<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы | Amirize</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bruno+Ace&family=Nunito:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #181818 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .maintenance-container {
            max-width: 800px;
            width: 100%;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .logo {
            font-family: 'Bruno Ace', sans-serif;
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }
        
        .emoji {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .message {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
            border-left: 5px solid #bbbbbb;
        }
        
        .message p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #eee;
        }
        
        .progress-container {
            margin: 40px 0;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
            color: #aaa;
        }
        
        .progress-bar {
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #cacaca, #777777);
            width: 65%;
            border-radius: 5px;
            animation: loading 3s infinite alternate;
        }
        
        @keyframes loading {
            0% {
                width: 60%;
            }
            100% {
                width: 70%;
            }
        }
        
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 10px;
            width: 180px;
            transition: transform 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.12);
        }
        
        .feature i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #8d8d8d;
        }
        
        .feature h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .feature p {
            font-size: 0.9rem;
            color: #bbb;
        }
        
        .contact {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .contact p {
            color: #aaa;
            margin-bottom: 15px;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            background-color: #6d6d6d;
            transform: scale(1.1);
        }
        
        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #c1c1c1, #616161);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(234, 234, 234, 0.3);
        }
        
        .back-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(216, 216, 216, 0.4);
        }
        
        .back-home i {
            margin-right: 10px;
        }
        
        .heart {
            color: #d8d8d8;
            animation: heartbeat 1.5s infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .maintenance-container {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .emoji {
                font-size: 4rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .features {
                gap: 15px;
            }
            
            .feature {
                width: 160px;
                padding: 15px;
            }
        }
        
        @media (max-width: 576px) {
            .logo {
                font-size: 2rem;
            }
            
            .emoji {
                font-size: 3.5rem;
            }
            
            h1 {
                font-size: 1.7rem;
            }
            
            .features {
                flex-direction: column;
                align-items: center;
            }
            
            .feature {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo">AMIRIZE</div>
        <h1>Упс! Технические работы</h1>
        
        <p class="subtitle">Мы делаем наш магазин еще лучше для вас! </p>
        
        <div class="message">
            <p>Наши милые программисты усердно трудятся, чтобы улучшить ваш опыт покупок. Скоро вернемся с обновлениями!</p>
        </div>
        
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> На главную
        </a>
    </div>
    

</body>
</html>
